<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="55%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Decorative circles (background texture) -->
  <circle cx="60"  cy="60"  r="55" fill="rgba(255,255,255,0.06)"/>
  <circle cx="460" cy="460" r="70" fill="rgba(255,255,255,0.06)"/>
  <circle cx="440" cy="80"  r="40" fill="rgba(255,255,255,0.05)"/>

  <!-- Stars -->
  <!-- Star top-left -->
  <polygon points="78,130 83,116 88,130 102,130 91,139 95,153 83,144 71,153 75,139 64,130" fill="#FDE68A" opacity="0.95"/>
  <!-- Star top-right -->
  <polygon points="400,90 403,81 406,90 415,90 408,96 411,105 403,99 395,105 398,96 391,90" fill="white" opacity="0.85"/>
  <!-- Star bottom-right -->
  <polygon points="436,370 439,362 442,370 450,370 444,375 447,383 439,378 431,383 434,375 428,370" fill="#FDE68A" opacity="0.8"/>
  <!-- Small dot accents -->
  <circle cx="100" cy="390" r="7" fill="white" opacity="0.5"/>
  <circle cx="430" cy="200" r="5" fill="white" opacity="0.45"/>
  <circle cx="55"  cy="250" r="4" fill="#FDE68A" opacity="0.6"/>

  <!-- Smoke puffs -->
  <circle cx="316" cy="138" r="18" fill="rgba(255,255,255,0.28)"/>
  <circle cx="300" cy="118" r="13" fill="rgba(255,255,255,0.18)"/>
  <circle cx="332" cy="112" r="16" fill="rgba(255,255,255,0.2)"/>

  <!-- Chimney -->
  <rect x="298" y="150" width="40" height="90" rx="8" fill="#EDE9FE"/>

  <!-- House shadow -->
  <polygon points="256,124 412,288 100,288" fill="rgba(0,0,0,0.12)" transform="translate(6,8)"/>
  <rect x="146" y="278" width="232" height="182" rx="12" fill="rgba(0,0,0,0.1)" transform="translate(6,8)"/>

  <!-- Roof -->
  <polygon points="256,124 412,288 100,288" fill="white"/>

  <!-- House body -->
  <rect x="140" y="276" width="232" height="182" rx="12" fill="white"/>

  <!-- Left window glow -->
  <rect x="158" y="304" width="62" height="54" rx="12" fill="#FCD34D" filter="url(#glow)" opacity="0.6"/>
  <!-- Left window -->
  <rect x="160" y="306" width="58" height="50" rx="10" fill="url(#win)"/>
  <line x1="189" y1="306" x2="189" y2="356" stroke="rgba(180,120,0,0.25)" stroke-width="3"/>
  <line x1="160" y1="331" x2="218" y2="331" stroke="rgba(180,120,0,0.25)" stroke-width="3"/>

  <!-- Right window glow -->
  <rect x="290" y="304" width="62" height="54" rx="12" fill="#FCD34D" filter="url(#glow)" opacity="0.6"/>
  <!-- Right window -->
  <rect x="292" y="306" width="58" height="50" rx="10" fill="url(#win)"/>
  <line x1="321" y1="306" x2="321" y2="356" stroke="rgba(180,120,0,0.25)" stroke-width="3"/>
  <line x1="292" y1="331" x2="350" y2="331" stroke="rgba(180,120,0,0.25)" stroke-width="3"/>

  <!-- Door -->
  <path d="M222,458 L222,378 A34,34 0 0,1 290,378 L290,458 Z" fill="#C4B5FD"/>
  <!-- Door panel lines -->
  <rect x="230" y="390" width="52" height="24" rx="5" fill="rgba(139,92,246,0.3)"/>
  <rect x="230" y="422" width="52" height="24" rx="5" fill="rgba(139,92,246,0.3)"/>
  <!-- Door knob -->
  <circle cx="281" cy="420" r="6" fill="#7C3AED"/>

</svg>
